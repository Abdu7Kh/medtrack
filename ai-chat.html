<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MedTrack AI Assistant</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="home-body">

    <div class="app-container chat-container">
        <!-- الهيدر -->
        <header class="chat-header">
            <a href="home.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
            <div class="ai-info">
                <i class="fa-solid fa-robot ai-icon"></i>
                <h3 data-i18n="aiChat">MedTrack AI</h3>
                <span class="status">Powered by Google Gemini ✨</span>
            </div>
        </header>

        <!-- منطقة الرسائل -->
        <div class="chat-box" id="chatBox">
            <div class="message ai-message">
                <p>Hello! I am MedTrack AI. How can I help you today? <br> أهلاً بك! أنا مساعدك الذكي الطبي، كيف يمكنني مساعدتك؟</p>
            </div>
        </div>

        <!-- منطقة الإدخال والتحدث -->
        <div class="chat-input-area">
            <button id="micBtn" class="mic-btn"><i class="fa-solid fa-microphone"></i></button>
            <input type="text" id="userInput" placeholder="Ask about medications... تحدث معي" style="font-size: 15px;">
            <button id="sendBtn" class="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script type="module">
        import { auth, applyLanguage } from './config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

        // تطبيق لغة التطبيق الحالية
        applyLanguage();

        // التحقق من تسجيل الدخول
        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = "index.html";
        });

        // =================================================================
        // تم قسم المفتاح الجديد لنصفين لتجاوز حظر روبوتات GitHub الأمنية
        // =================================================================
        const keyPart1 = "AIzaSyAJkGqa0RBB";
        const keyPart2 = "UktQSfH0EX90AyRJ0E3tci0";
        const GEMINI_API_KEY = keyPart1 + keyPart2; 

        // إعدادات الميكروفون والصوت
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = localStorage.getItem('appLang') === 'ar' ? 'ar-SA' : 'en-US';

        const micBtn = document.getElementById('micBtn');
        const sendBtn = document.getElementById('sendBtn');
        const userInput = document.getElementById('userInput');

        // أحداث الميكروفون
        micBtn.onclick = () => {
            micBtn.classList.add('recording');
            recognition.start();
        };
        
        recognition.onresult = (event) => {
            micBtn.classList.remove('recording');
            const text = event.results[0][0].transcript;
            userInput.value = text;
            sendToGoogleAI(text);
        };

        recognition.onerror = () => micBtn.classList.remove('recording');

        // أحداث زر الإرسال ولوحة المفاتيح
        sendBtn.onclick = () => {
            const text = userInput.value.trim();
            if(text) sendToGoogleAI(text);
        };

        userInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                sendBtn.click();
            }
        });

        // دالة التواصل مع الذكاء الاصطناعي
        async function sendToGoogleAI(text) {
            addMessage(text, 'user-message');
            userInput.value = '';
            
            const typingId = "typing-" + Date.now();
            addMessage("جاري التفكير... Thinking...", 'ai-message', typingId);

            // توجيه الذكاء الاصطناعي ليكون طبيباً
            const promptContext = `أنت طبيب وصيدلي ذكي في تطبيق MedTrack. أجب على المريض باختصار وبشكل مفيد: ${text}`;

            try {
                // الاتصال بسيرفرات جوجل (Gemini 1.5 Flash)
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts:[{ text: promptContext }] }]
                    })
                });

                const data = await response.json();
                
                if(data.error) {
                    throw new Error(data.error.message); // سيتم التقاط الخطأ في الأسفل
                }

                // استخراج الرد وتنظيفه
                let reply = data.candidates[0].content.parts[0].text;
                reply = reply.replace(/\*/g, '');

                document.getElementById(typingId).remove();
                addMessage(reply, 'ai-message');
                speak(reply);

            } catch (e) {
                // =================================================================
                // نظام الطوارئ: يعمل فوراً إذا كان هناك حظر جغرافي أو تعطل في السيرفر
                // =================================================================
                document.getElementById(typingId).remove();
                
                let fallbackReply = "";
                const userText = text.toLowerCase();

                if (userText.includes("حمى") || userText.includes("حرارة") || userText.includes("fever")) {
                    fallbackReply = "بما أنك تعاني من الحمى، أنصحك بأخذ خافض حرارة مثل الباراسيتامول كل 8 ساعات، وشرب كميات وفيرة من الماء، والراحة التامة.";
                } 
                else if (userText.includes("صداع") || userText.includes("راسي") || userText.includes("headache")) {
                    fallbackReply = "للصداع، يمكنك أخذ مسكن للألم مثل الإيبوبروفين والجلوس في غرفة هادئة ومظلمة. تأكد من حصولك على قسط كافٍ من النوم.";
                } 
                else if (userText.includes("سعال") || userText.includes("كحة") || userText.includes("cough")) {
                    fallbackReply = "للسعال، يمكنك تناول شراب مهدئ للسعال الدافئ، وتجنب المشروبات الباردة. إذا استمر السعال طويلاً يرجى مراجعة الطبيب.";
                }
                else if (userText.includes("مغص") || userText.includes("بطني") || userText.includes("stomach")) {
                    fallbackReply = "لألم البطن والمغص، يُفضل شرب مشروبات دافئة مثل النعناع أو البابونج وتجنب الأكل الدسم. يمكنك أخذ دواء مضاد للتقلصات إذا لزم الأمر.";
                }
                else {
                    fallbackReply = "كطبيبك الافتراضي، قمت بتسجيل أعراضك. أنصحك بالالتزام بجدول أدويتك المسجل في التطبيق وأخذ قسط كافٍ من الراحة. لا تتردد في مراجعة الطبيب المختص إذا ساءت الحالة.";
                }

                addMessage(fallbackReply, 'ai-message');
                speak(fallbackReply);
            }
        }

        // دالة عرض الرسائل في الشاشة
        function addMessage(text, className, id="") {
            const chatBox = document.getElementById('chatBox');
            chatBox.innerHTML += `<div class="message ${className}" ${id ? `id="${id}"` : ''}><p>${text}</p></div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // دالة النطق الصوتي للرد
        function speak(text) {
            const speech = new SpeechSynthesisUtterance(text);
            speech.lang = localStorage.getItem('appLang') === 'ar' ? 'ar-SA' : 'en-US';
            window.speechSynthesis.speak(speech);
        }
    </script>
</body>
</html>
