<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MedTrack AI Assistant</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="home-body">

    <div class="app-container chat-container">
        <!-- الهيدر -->
        <header class="chat-header">
            <a href="home.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
            <div class="ai-info">
                <i class="fa-solid fa-robot ai-icon"></i>
                <h3 data-i18n="aiChat">MedTrack AI</h3>
                <span class="status">Powered by Google Gemini ✨</span>
            </div>
        </header>

        <!-- منطقة الرسائل -->
        <div class="chat-box" id="chatBox">
            <div class="message ai-message">
                <p>Hello! I am MedTrack AI. How can I help you today? <br> أهلاً بك! أنا مساعدك الذكي الطبي، كيف يمكنني مساعدتك؟</p>
            </div>
        </div>

        <!-- منطقة الإدخال والتحدث -->
        <div class="chat-input-area">
            <button id="micBtn" class="mic-btn"><i class="fa-solid fa-microphone"></i></button>
            <input type="text" id="userInput" placeholder="Ask about medications... تحدث معي" style="font-size: 15px;">
            <button id="sendBtn" class="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script type="module">
        import { auth, applyLanguage } from './config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

        applyLanguage();

        // التحقق من تسجيل الدخول
        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = "index.html";
        });

        // ==========================================
        // ضع مفتاح جوجل GEMINI الخاص بك هنا بين علامتي التنصيص
        // ==========================================
        const GEMINI_API_KEY = "AIzaSyBhd4h0d8sbwNcRzurpKBj9auZo2dKldXI"; 

        // إعدادات الميكروفون
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = localStorage.getItem('appLang') === 'ar' ? 'ar-SA' : 'en-US';

        const micBtn = document.getElementById('micBtn');
        const sendBtn = document.getElementById('sendBtn');
        const userInput = document.getElementById('userInput');

        micBtn.onclick = () => {
            micBtn.classList.add('recording');
            recognition.start();
        };
        
        recognition.onresult = (event) => {
            micBtn.classList.remove('recording');
            const text = event.results[0][0].transcript;
            userInput.value = text;
            sendToGoogleAI(text);
        };

        recognition.onerror = () => micBtn.classList.remove('recording');

        sendBtn.onclick = () => {
            const text = userInput.value.trim();
            if(text) sendToGoogleAI(text);
        };

        userInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                sendBtn.click();
            }
        });

        // دالة إرسال الطلب لذكاء جوجل (Gemini)
        async function sendToGoogleAI(text) {
            addMessage(text, 'user-message');
            userInput.value = '';
            
            const typingId = "typing-" + Date.now();
            addMessage("جاري التفكير... Thinking...", 'ai-message', typingId);

            // نطلب من الذكاء الاصطناعي أن يتقمص دور صيدلي
            const promptContext = `أنت مساعد صيدلي وطبيب افتراضي ذكي داخل تطبيق MedTrack. 
            اسمك MedTrack AI. 
            أجب على سؤال المريض التالي باختصار وبشكل طبي دقيق ومفيد.
            إذا كان السؤال بالعربية أجب بالعربية، وإذا كان بالإنجليزية أجب بالإنجليزية.
            سؤال المريض: ${text}`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${GEMINI_API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: promptContext }] }]
                    })
                });

                const data = await response.json();
                
                if(data.error) {
                    throw new Error(data.error.message);
                }

                // استخراج الرد من جوجل
                let reply = data.candidates[0].content.parts[0].text;
                
                // إزالة علامات النجمة (Markdown) التي يرسلها Gemini أحياناً ليكون النص نظيفاً
                reply = reply.replace(/\*/g, '');

                // إزالة رسالة جاري التفكير ووضع الرد الحقيقي
                document.getElementById(typingId).remove();
                addMessage(reply, 'ai-message');
                speak(reply);

            } catch (e) {
                console.error(e);
                document.getElementById(typingId).remove();
                addMessage("عذراً، حدث خطأ في الاتصال. تأكد من اتصال الإنترنت أو صحة مفتاح API.", 'ai-message');
            }
        }

        // دالة طباعة الرسائل على الشاشة
        function addMessage(text, className, id="") {
            const chatBox = document.getElementById('chatBox');
            chatBox.innerHTML += `<div class="message ${className}" ${id ? `id="${id}"` : ''}><p>${text}</p></div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // دالة نطق الرد الصوتي
        function speak(text) {
            const speech = new SpeechSynthesisUtterance(text);
            speech.lang = localStorage.getItem('appLang') === 'ar' ? 'ar-SA' : 'en-US';
            window.speechSynthesis.speak(speech);
        }
    </script>
</body>
</html>
