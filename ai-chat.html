<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MedTrack AI Assistant</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="home-body">

    <div class="app-container chat-container">
        <!-- الهيدر -->
        <header class="chat-header">
            <a href="home.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
            <div class="ai-info">
                <i class="fa-solid fa-robot ai-icon"></i>
                <h3 data-i18n="aiChat">MedTrack AI</h3>
                <span class="status" style="color: #5CB85C;">Online - AI Ready ✨</span>
            </div>
        </header>

        <!-- منطقة الرسائل -->
        <div class="chat-box" id="chatBox">
            <div class="message ai-message">
                <p>Hello! I am MedTrack AI. How can I help you today? <br> أهلاً بك! أنا مساعدك الذكي الطبي، كيف يمكنني مساعدتك؟</p>
            </div>
        </div>

        <!-- منطقة الإدخال والتحدث -->
        <div class="chat-input-area">
            <button id="micBtn" class="mic-btn"><i class="fa-solid fa-microphone"></i></button>
            <input type="text" id="userInput" placeholder="Ask about medications... تحدث معي" style="font-size: 15px;">
            <button id="sendBtn" class="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script type="module">
        import { auth, applyLanguage } from './config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

        applyLanguage();

        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = "index.html";
        });

        // =================================================================
        // ضع مفتاح OpenRouter الجديد الخاص بك هنا (مقسم لتجنب الحظر)
        // يبدأ المفتاح عادة بـ sk-or-v1-
        // =================================================================
        const keyPart1 = "sk-or-v1-"; 
        const keyPart2 = "a654c6ca5dc8ae52dbedacca4bead3940ed9c9e4c9fafe85272f6ca34f2aa732";
        const OPENROUTER_API_KEY = keyPart1 + keyPart2; 

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = localStorage.getItem('appLang') === 'ar' ? 'ar-SA' : 'en-US';

        const micBtn = document.getElementById('micBtn');
        const sendBtn = document.getElementById('sendBtn');
        const userInput = document.getElementById('userInput');

        micBtn.onclick = () => {
            micBtn.classList.add('recording');
            recognition.start();
        };
        
        recognition.onresult = (event) => {
            micBtn.classList.remove('recording');
            const text = event.results[0][0].transcript;
            userInput.value = text;
            sendToRealAI(text);
        };

        recognition.onerror = () => micBtn.classList.remove('recording');

        sendBtn.onclick = () => {
            const text = userInput.value.trim();
            if(text) sendToRealAI(text);
        };

        userInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                sendBtn.click();
            }
        });

        // دالة التواصل مع الذكاء الاصطناعي الحقيقي عبر OpenRouter
        async function sendToRealAI(text) {
            addMessage(text, 'user-message');
            userInput.value = '';
            
            const typingId = "typing-" + Date.now();
            addMessage("جاري التفكير... Thinking...", 'ai-message', typingId);

            try {
                // استخدام سيرفرات OpenRouter التي لا تحظر الدول
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${OPENROUTER_API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        // هذا الموديل (Llama 3) مجاني تماماً على منصة أوبن راوتر وقوي جداً بالعربية
                        model: "meta-llama/llama-3-8b-instruct:free", 
                        messages:[
                            { role: "system", content: "أنت مساعد طبي وصيدلي افتراضي ذكي في تطبيق اسمه MedTrack. أجب المريض باختصار، وبشكل طبي دقيق، وتعاطف معه. تحدث باللغة التي يتحدث بها المريض." },
                            { role: "user", content: text }
                        ]
                    })
                });

                const data = await response.json();
                
                if(data.error) {
                    throw new Error(data.error.message);
                }

                // استخراج الرد الحقيقي
                let reply = data.choices[0].message.content;
                reply = reply.replace(/\*/g, ''); // تنظيف النص من النجوم

                document.getElementById(typingId).remove();
                addMessage(reply, 'ai-message');
                speak(reply); // النطق الصوتي للرد الحقيقي

            } catch (e) {
                console.error(e);
                document.getElementById(typingId).remove();
                addMessage("حدث خطأ في الاتصال، يرجى المحاولة مرة أخرى.", 'ai-message');
            }
        }

        function addMessage(text, className, id="") {
            const chatBox = document.getElementById('chatBox');
            chatBox.innerHTML += `<div class="message ${className}" ${id ? `id="${id}"` : ''}><p>${text}</p></div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function speak(text) {
            const speech = new SpeechSynthesisUtterance(text);
            speech.lang = localStorage.getItem('appLang') === 'ar' ? 'ar-SA' : 'en-US';
            window.speechSynthesis.speak(speech);
        }
    </script>
</body>
</html>
