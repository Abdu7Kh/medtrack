<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MedTrack Settings</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="setup-body">
    <div class="app-container" style="padding-bottom: 90px; transition: 0.3s;">
        <!-- الهيدر -->
        <div class="top-header" style="justify-content: flex-start; margin-bottom: 20px;">
            <img src="logo.png" alt="Logo" class="small-logo">
            <h2 class="brand-name-small"><span class="blue-text">Med</span><span class="green-text">Track</span></h2>
            <h3 style="margin-left: auto;" data-i18n="settings">Settings</h3>
        </div>

        <!-- معلومات البروفايل -->
        <div class="settings-card" style="padding: 15px; display: flex; align-items: center; gap: 15px;">
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" style="width: 50px; border-radius: 50%;">
            <div>
                <h3 id="userNameDisplay" style="margin-bottom: 5px; font-size: 18px;">Loading...</h3>
                <p id="userEmailDisplay" style="color: #666; font-size: 14px;"><i class="fa-solid fa-circle-check" style="color: #5CB85C;"></i> </p>
            </div>
            <i class="fa-solid fa-chevron-right" style="margin-left: auto; color: #ccc;"></i>
        </div>

        <!-- 1. الحساب (Account) -->
        <div class="settings-section-title" data-i18n="account">Account</div>
        <div class="settings-card">
            <!-- المعلومات الشخصية -->
            <a href="#" class="settings-item" id="personalInfoBtn">
                <div class="settings-item-left"><div class="settings-icon icon-blue"><i class="fa-solid fa-user"></i></div> <span data-i18n="personalInfo">Personal Information</span></div>
                <div class="settings-item-right"><i class="fa-solid fa-chevron-right"></i></div>
            </a>
            <!-- تغيير كلمة المرور (Firebase فعلي) -->
            <a href="#" class="settings-item" id="resetPassBtn">
                <div class="settings-item-left"><div class="settings-icon icon-green"><i class="fa-solid fa-lock"></i></div> <span data-i18n="changePass">Change Password</span></div>
                <div class="settings-item-right"><i class="fa-solid fa-chevron-right"></i></div>
            </a>
            <!-- الإشعارات -->
            <div class="settings-item">
                <div class="settings-item-left"><div class="settings-icon icon-yellow"><i class="fa-solid fa-bell"></i></div> <span data-i18n="notifications">Notifications</span></div>
                <div class="settings-item-right">
                    <label class="switch">
                        <input type="checkbox" checked onchange="alert(this.checked ? 'System notifications Enabled' : 'System notifications Disabled')">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
            <!-- اللغة -->
            <div class="settings-item">
                <div class="settings-item-left"><div class="settings-icon icon-dark"><i class="fa-solid fa-globe"></i></div> <span data-i18n="language">Language</span></div>
                <div class="settings-item-right">
                    <select id="langSelect" style="border:none; background:transparent; color:#666; font-weight:bold; outline:none; text-align:right;">
                        <option value="en">English</option>
                        <option value="ar">العربية</option>
                    </select>
                    <i class="fa-solid fa-chevron-right"></i>
                </div>
            </div>
            <!-- المظهر (ميزة الوضع الداكن الفعلي) -->
            <div class="settings-item" id="themeBtn" style="cursor: pointer;">
                <div class="settings-item-left"><div class="settings-icon icon-blue" style="background:#1E88E5;"><i class="fa-solid fa-palette"></i></div> <span data-i18n="appTheme">App Theme</span></div>
                <div class="settings-item-right"><span id="themeText" data-i18n="themeLight">Light</span> <i class="fa-solid fa-chevron-right"></i></div>
            </div>
        </div>

        <!-- 2. الأدوية (Medication) -->
        <div class="settings-section-title" data-i18n="medicationSec">Medication</div>
        <div class="settings-card">
            <a href="home.html" class="settings-item">
                <div class="settings-item-left"><div class="settings-icon icon-purple"><i class="fa-solid fa-briefcase-medical"></i></div> <span data-i18n="medSchedule">Medication Schedule</span></div>
                <div class="settings-item-right"><i class="fa-solid fa-chevron-right"></i></div>
            </a>
            <a href="#" class="settings-item" onclick="alert('✅ Reminders are actively synchronized with your device calendar and alarm system.'); return false;">
                <div class="settings-item-left"><div class="settings-icon icon-yellow"><i class="fa-solid fa-clock"></i></div> <span data-i18n="reminders">Reminders</span></div>
                <div class="settings-item-right"><i class="fa-solid fa-chevron-right"></i></div>
            </a>
            <a href="add-med.html" class="settings-item">
                <div class="settings-item-left"><div class="settings-icon icon-green"><i class="fa-solid fa-plus"></i></div> <span data-i18n="addMedication">Add Medication</span></div>
                <div class="settings-item-right"><i class="fa-solid fa-chevron-right"></i></div>
            </a>
        </div>

        <!-- 3. الدعم (Support) -->
        <div class="settings-section-title" data-i18n="support">Support</div>
        <div class="settings-card">
            <!-- دليل الاستخدام -->
            <a href="#" class="settings-item" onclick="alert('MedTrack Quick Guide:\n1. Home: View daily medications.\n2. Add (+): Schedule new medicines.\n3. AI Chat: Talk to your medical assistant.\n4. Settings: Manage your account.'); return false;">
                <div class="settings-item-left"><div class="settings-icon icon-cyan"><i class="fa-solid fa-circle-question"></i></div> <span data-i18n="helpFAQ">Help & FAQ</span></div>
                <div class="settings-item-right"><i class="fa-solid fa-chevron-right"></i></div>
            </a>
            <a href="mailto:support@medtrack.com" class="settings-item">
                <div class="settings-item-left"><div class="settings-icon icon-red"><i class="fa-solid fa-envelope"></i></div> <span data-i18n="contactUs">Contact Us</span></div>
                <div class="settings-item-right"><i class="fa-solid fa-chevron-right"></i></div>
            </a>
        </div>

        <!-- زر تسجيل الخروج -->
        <button id="logoutBtn" class="logout-btn-large">
            <i class="fa-solid fa-right-from-bracket"></i> <span data-i18n="logout">Log Out</span>
        </button>

        <!-- القائمة السفلية -->
        <nav class="bottom-nav">
            <a href="home.html" class="nav-item"><i class="fa-solid fa-house"></i> <span data-i18n="home">Home</span></a>
            <a href="ai-chat.html" class="nav-item"><i class="fa-solid fa-robot"></i> <span data-i18n="aiChat">AI Chat</span></a>
            <a href="add-med.html" class="nav-item add-btn" style="text-decoration:none;"><div class="add-circle"><i class="fa-solid fa-plus"></i></div></a>
            <a href="settings.html" class="nav-item active"><i class="fa-solid fa-gear"></i> <span data-i18n="settings">Settings</span></a>
        </nav>
    </div>

    <script type="module">
        import { auth, applyLanguage, setLanguage } from './config.js';
        import { onAuthStateChanged, signOut, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

        applyLanguage();
        let currentUserEmail = "";

        // جلب بيانات المستخدم
        onAuthStateChanged(auth, (user) => {
            if (user) {
                const name = localStorage.getItem('patientName') || 'Guest';
                // بما أنه لا يوجد إيميل الآن، سنعرض ID سري أو رقم المريض
                document.getElementById('userEmailDisplay').innerHTML = `<i class="fa-solid fa-id-card"></i> Patient ID: ${user.uid.substring(0, 8)}`;
                document.getElementById('userNameDisplay').innerText = name;
            } else {
                window.location.href = "index.html";
            }
        });

        // 1. تغيير اللغة
        const langSelect = document.getElementById('langSelect');
        langSelect.value = localStorage.getItem('appLang') || 'en';
        langSelect.addEventListener('change', (e) => setLanguage(e.target.value));

        // 2. تسجيل الخروج
        document.getElementById('logoutBtn').addEventListener('click', () => {
            const msg = localStorage.getItem('appLang') === 'ar' ? "هل أنت متأكد من تسجيل الخروج؟" : "Are you sure you want to log out?";
            if(confirm(msg)) {
                signOut(auth).then(() => window.location.href = "index.html");
            }
        });

        // 3. عرض المعلومات الشخصية
        document.getElementById('personalInfoBtn').addEventListener('click', (e) => {
            e.preventDefault();
            const name = currentUserEmail.split('@')[0];
            alert(`--- User Profile ---\nUsername: ${name}\nEmail: ${currentUserEmail}\nAccount Status: Active & Verified ✅`);
        });

        // 4. إرسال رابط حقيقي لتغيير كلمة المرور عبر Firebase
        document.getElementById('resetPassBtn').addEventListener('click', (e) => {
            e.preventDefault();
            const msg = localStorage.getItem('appLang') === 'ar' ? "إرسال رابط استعادة كلمة المرور إلى إيميلك؟" : "Send password reset link to your email?";
            if(confirm(msg)) {
                sendPasswordResetEmail(auth, currentUserEmail).then(() => {
                    alert(localStorage.getItem('appLang') === 'ar' ? "تم الإرسال! راجع صندوق الوارد في إيميلك." : "Link Sent! Check your email inbox.");
                }).catch((error) => {
                    alert("Error: " + error.message);
                });
            }
        });

        // 5. تفعيل ميزة الوضع الداكن (Dark Mode)
        document.getElementById('themeBtn').addEventListener('click', () => {
            const themeText = document.getElementById('themeText');
            if(themeText.innerText === 'Light' || themeText.innerText === 'فاتح') {
                themeText.innerText = localStorage.getItem('appLang') === 'ar' ? 'داكن' : 'Dark';
                // خدعة برمجية تعكس ألوان الشاشة بالكامل للوضع الداكن
                document.body.style.filter = "invert(1) hue-rotate(180deg)";
            } else {
                themeText.innerText = localStorage.getItem('appLang') === 'ar' ? 'فاتح' : 'Light';
                document.body.style.filter = "none"; // العودة للوضع الطبيعي
            }
        });
    </script>
</body>
</html>
