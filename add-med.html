<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Medication</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="setup-body">
    <div class="app-container">
        <div class="top-header" style="justify-content: flex-start; margin-bottom: 30px;">
            <a href="settings.html" style="color: #333; font-size: 20px; text-decoration: none;"><i class="fa-solid fa-arrow-left"></i></a>
            <h3 style="margin-left: 20px;" data-i18n="addMedication">Add Medication</h3>
        </div>
        
        <form id="addMedForm" class="settings-card" style="padding: 20px; display: flex; flex-direction: column; gap: 15px;">
            <div>
                <label style="font-size: 14px; color: #666; margin-bottom: 5px; display: block;">Medicine Name</label>
                <input type="text" id="medName" placeholder="e.g., Paracetamol" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; outline: none;">
            </div>
            
            <div>
                <label style="font-size: 14px; color: #666; margin-bottom: 5px; display: block;">Time</label>
                <input type="time" id="medTime" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; outline: none;">
            </div>

            <div>
                <label style="font-size: 14px; color: #666; margin-bottom: 5px; display: block;">Icon Color</label>
                <select id="medColor" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; outline: none;">
                    <option value="green-bg">Green</option>
                    <option value="blue-bg">Blue</option>
                    <option value="yellow-bg">Yellow</option>
                </select>
            </div>

            <button type="submit" class="login-btn" style="margin-top: 10px;" data-i18n="addMedication">Add Medication</button>
        </form>
    </div>

    <script type="module">
        import { auth, db, applyLanguage } from './config.js';
        import { push, ref } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

        applyLanguage();
        let currentUser = null;

        onAuthStateChanged(auth, (user) => {
            if (user) currentUser = user;
            else window.location.href = "index.html";
        });

        document.getElementById('addMedForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = "Saving...";
            
            try {
                // حفظ الدواء في Firebase
                await push(ref(db, 'users/' + currentUser.uid + '/medications'), {
                    name: document.getElementById('medName').value,
                    time: document.getElementById('medTime').value,
                    color: document.getElementById('medColor').value,
                    isTaken: false
                });
                alert("Medication added successfully!");
                window.location.href = "home.html"; // العودة للرئيسية لرؤيته
            } catch (error) {
                alert("Error: " + error.message);
                btn.innerText = "Add Medication";
            }
        });
    </script>
</body>
</html>
