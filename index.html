<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MedTrack Welcome</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="login-container" style="justify-content: center; align-items: center;">
        
        <!-- الشعار الترحيبي -->
        <div class="logo-section" style="margin-top: 0; margin-bottom: 40px; flex-direction: column;">
            <img src="logo.png" alt="MedTrack Logo" style="width: 100px; margin-bottom: 15px;"> 
            <h1 class="brand-name" style="font-size: 32px;"><span class="blue-text">Med</span><span class="green-text">Track</span></h1>
            <p style="color: #666; margin-top: 10px; font-size: 15px;">Your Smart Medical Assistant</p>
        </div>

        <!-- إدخال الاسم فقط -->
        <form class="login-form" id="welcomeForm" style="width: 100%;">
            <div class="input-group">
                <i class="fa-solid fa-user icon"></i>
                <input type="text" id="patientName" placeholder="Enter your name / أدخل اسمك" required style="font-size: 16px;">
            </div>

            <!-- زر البدء -->
            <button type="submit" class="login-btn" id="startBtn" style="margin-top: 20px; font-size: 18px; display: flex; justify-content: center; align-items: center; gap: 10px;">
                Get Started <i class="fa-solid fa-arrow-right"></i>
            </button>
        </form>
    </div>

    <script type="module">
        import { auth } from './config.js';
        // استدعاء دالة الدخول كضيف من فايربيس
        import { signInAnonymously } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

        const welcomeForm = document.getElementById('welcomeForm');
        
        welcomeForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            const patientName = document.getElementById('patientName').value.trim();
            const startBtn = document.getElementById('startBtn');
            
            startBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Loading...';
            startBtn.disabled = true;
            
            try {
                // حفظ الاسم في الذاكرة لكي نعرضه في الشاشات الأخرى
                localStorage.setItem('patientName', patientName);
                
                // تسجيل الدخول السري (المجهول) في فايربيس
                await signInAnonymously(auth);
                
                // التوجيه للصفحة الرئيسية فوراً
                window.location.href = "home.html";
            } catch (error) {
                alert("Error connecting to server: " + error.message);
                startBtn.innerHTML = 'Get Started <i class="fa-solid fa-arrow-right"></i>';
                startBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
